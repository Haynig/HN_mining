<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HN Wallet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;font-family:Arial;background:#f4f4f4}
.page{display:none;padding:20px;padding-bottom:90px}
.active{display:block}
.card{background:white;padding:15px;margin:10px 0;border-radius:12px}
button{padding:10px;border:none;border-radius:8px;background:black;color:white;margin-top:10px;width:100%}
.bottom{position:fixed;bottom:0;left:0;right:0;height:60px;background:white;display:flex;justify-content:space-around;align-items:center;border-top:1px solid #ddd}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="page active">
<h2>Login</h2>
<input id="loginUsername" placeholder="Username"><br><br>
<input id="loginPassword" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<button onclick="showPage('registerPage')">Register</button>
</div>

<!-- REGISTER -->
<div id="registerPage" class="page">
  <h2>Register</h2>

  <!-- Username -->
  <input id="regUsername" placeholder="Username"><br><br>

  <!-- Email -->
  <input id="regEmail" type="email" placeholder="Email"><br><br>

  <!-- Password -->
  <input id="regPassword" type="password" placeholder="Password"><br><br>

  <!-- Buttons -->
  <button onclick="register()">Register</button>
  <button onclick="showPage('loginPage')">Back</button>
</div>

<!-- HOME -->
<div id="homePage" class="page">
<h2>Umumiy balans</h2>
<div class="card">
So‘m: <b id="somBalance">0</b><br>
HN: <b id="hnBalance">0</b>
</div>
</div>

<!-- DEPOSIT -->
<div id="depositPage" class="page">
<h2>Deposit</h2>
<input id="depositAmount" placeholder="Amount"><br>
<select id="depositType">
<option value="hn">HN</option>
<option value="som">So‘m</option>
</select>
<button onclick="deposit()">To‘ldirish</button>
</div>

<!-- WITHDRAW -->
<div id="withdrawPage" class="page">
<h2>Withdraw</h2>
<input id="withdrawAmount" placeholder="Amount"><br>
<select id="withdrawType">
<option value="hn">HN</option>
<option value="som">So‘m</option>
</select>
<button onclick="withdraw()">Chiqarish</button>
</div>

<!-- MONITORING -->
<div id="monitorPage" class="page">
<h2>Monitoring</h2>
<div id="transactions"></div>
</div>

<!-- MENU -->
<div id="menu" class="bottom" style="display:none">
<div onclick="showPage('homePage')">🏠</div>
<div onclick="showPage('depositPage')">💰</div>
<div onclick="showPage('withdrawPage')">💸</div>
<div onclick="showPage('monitorPage');loadTransactions()">📊</div>
<div onclick="logout()">🚪</div>
</div>

<script>
const API =
  window.location.hostname === "localhost"
    ? "http://localhost:10000/api"
    : "https://hn-wallet-backend.onrender.com/api";

function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function saveUser(id){
  localStorage.setItem("userId", id);
}

function getUser(){
  return localStorage.getItem("userId");
}

async function register() {
  const username = regUsername.value;
  const password = regPassword.value;

  if (!username || !password) {
    alert("Barcha maydonlarni to‘ldiring!");
    return;
  }

  try {
    const response = await fetch(API + "/user/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    const data = await response.json();

    if (response.ok) {
      alert("Muvaffaqiyatli ro‘yxatdan o‘tildi!");
      showPage("loginPage");
    } else {
      alert(data.message);
    }

  } catch (err) {
    alert("Server bilan bog‘lanishda xato!");
  }
}

async function login(){
  const foydalanuvchi_nomi = loginUsername.value;
  const parol = loginPassword.value;

  const res = await fetch(API + "/user/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ foydalanuvchi_nomi, parol })
  });

  const data = await res.json();

  if(res.ok){
    saveUser(data.userId);
    document.getElementById("menu").style.display="flex";
    showPage("homePage");
    loadProfile();
  } else {
    alert(data.message);
  }
}

async function loadProfile(){
  const userId = getUser();
  const res = await fetch(API + "/wallet/" + userId);
  const data = await res.json();

  somBalance.innerText = data.somBalance || 0;
  hnBalance.innerText = data.hnBalance || 0;
}

async function deposit(){
  const amount = depositAmount.value;
  const type = depositType.value;
  const userId = getUser();

  const res = await fetch(API+"/wallet/deposit",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ userId, amount, type })
  });

  const data = await res.json();
  alert(data.message);
  loadProfile();
}

async function withdraw(){
  const amount = withdrawAmount.value;
  const type = withdrawType.value;
  const userId = getUser();

  const res = await fetch(API+"/wallet/withdraw",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ userId, amount, type })
  });

  const data = await res.json();
  alert(data.message);
  loadProfile();
}

async function loadTransactions(){
  const userId = getUser();
  const res = await fetch(API+"/wallet/transactions/"+userId);
  const data = await res.json();

  transactions.innerHTML="";
  data.forEach(t=>{
    transactions.innerHTML+=`
      <div class="card">
      ${t.type} - ${t.amount}<br>
      ${new Date(t.createdAt).toLocaleString()}
      </div>
    `;
  });
}

function logout(){
  localStorage.removeItem("userId");
  location.reload();
}
</script>

</body>
</html>
