<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HN Wallet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

.page{
display:none;
padding:20px;
padding-bottom:90px;
}

.active{
display:block;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:12px;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:black;
color:white;
margin-top:10px;
width:100%;
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #ddd;
}
  .green{
background:#1faa59;
color:white;
}

.blue{
background:#2f80ed;
color:white;
}

.deposit{
background:#d4f8d4;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage" class="page active">

<h2>Login</h2>

<input id="loginUsername" placeholder="Username"><br><br>

<input id="loginPassword" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<button onclick="showPage('registerPage')">Register</button>

</div>

<!-- REGISTER -->

<div id="registerPage" class="page">

<h2>Register</h2>

<input id="regUsername" placeholder="Username"><br><br>

<input id="regPassword" type="password" placeholder="Password"><br><br>

<button onclick="register()">Register</button>

<button onclick="showPage('loginPage')">Back</button>

</div>

<!-- HOME -->
<div id="homePage" class="page active">

<h2>Umumiy balans</h2>

<div class="card green">
<h3>So'm hisobi</h3>
<b id="somBalance">0</b>
</div>

<div class="card blue">
<h3>HN hisobi</h3>
<b id="hnBalance">0</b>
</div>
<div id="menu" class="bottom">

<div onclick="showPage('homePage')">🏠</div>

<div onclick="showPage('depositPage')">💰</div>

<div onclick="showPage('withdrawPage')">💸</div>

<div onclick="showPage('monitorPage')">📊</div>

<div onclick="logout()">🚪</div>

</div>
  
<h3>Jamg‘armalar</h3>

<button onclick="openDeposit()">+ Jamg‘arma ochish</button>

<div id="deposits"></div>

</div>
<script>

const API =
window.location.hostname==="localhost"
? "http://localhost:10000/api"
: "https://hn-bilimdoni-backend.onrender.com/api";


function showPage(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));

document.getElementById(id).classList.add("active");

}
  
function openDeposit(){
const depo = document.getElementById("deposits")
depo.innerHTML += `
<div class="card deposit">
Jamg‘arma balansi: 0
</div>
`

}

function saveToken(token){

localStorage.setItem("token",token);

}


function getToken(){

return localStorage.getItem("token");

}


function authHeader(){

return {

Authorization:"Bearer "+getToken()

};

}


async function register(){

const username = regUsername.value;

const password = regPassword.value;

const res = await fetch(API+"/user/register",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({username,password})

});

const data = await res.json();

alert(data.message);

if(res.ok){

showPage("loginPage");

}

}


async function login(){

const username = loginUsername.value;

const password = loginPassword.value;

const res = await fetch(API+"/user/login",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({username,password})

});

const data = await res.json();

if(data.token){

saveToken(data.token);

document.getElementById("menu").style.display="flex";

showPage("homePage");

loadProfile();

}else{

alert(data.message);

}

}


async function loadProfile(){

const res = await fetch(API+"/user/me",{

headers:authHeader()

});

const data = await res.json();

somBalance.innerText = data.somBalance;

hnBalance.innerText = data.hnBalance;

}


function logout(){

localStorage.removeItem("token");

location.reload();

}

</script>

</body>
</html>
