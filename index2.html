<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>HN Wallet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#f4f4f4}
.page{display:none;padding:20px;padding-bottom:90px}
.active{display:block}
.card{background:white;padding:15px;margin:10px 0;border-radius:12px}
input,select{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:1px solid #ccc}
button{padding:10px;border:none;border-radius:8px;background:black;color:white;margin-top:10px;width:100%}
.bottom{position:fixed;bottom:0;left:0;right:0;height:60px;background:white;display:flex;justify-content:space-around;align-items:center;border-top:1px solid #ddd}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="page active">
<h2>Login</h2>
<input id="loginUsername" placeholder="Username">
<input id="loginPassword" type="password" placeholder="Password">
<button id="loginBtn">Login</button>
<button id="goRegister">Register</button>
</div>

<!-- REGISTER -->
<div id="registerPage" class="page">
<h2>Register</h2>
<input id="regUsername" placeholder="Username">
<input id="regPassword" type="password" placeholder="Password">
<button id="registerBtn">Register</button>
<button id="goLogin">Back</button>
</div>

<!-- HOME -->
<div id="homePage" class="page">
<h2>Balans</h2>
<div class="card">
So‘m: <b id="somBalance">0</b><br>
HN: <b id="hnBalance">0</b>
</div>
</div>

<!-- DEPOSIT -->
<div id="depositPage" class="page">
<h2>Deposit</h2>
<input id="depositAmount" placeholder="Amount">
<select id="depositType">
<option value="hn">HN</option>
<option value="som">So‘m</option>
</select>
<button id="depositBtn">To‘ldirish</button>
</div>

<!-- WITHDRAW -->
<div id="withdrawPage" class="page">
<h2>Withdraw</h2>
<input id="withdrawAmount" placeholder="Amount">
<select id="withdrawType">
<option value="hn">HN</option>
<option value="som">So‘m</option>
</select>
<button id="withdrawBtn">Chiqarish</button>
</div>

<!-- MONITORING -->
<div id="monitorPage" class="page">
<h2>Monitoring</h2>
<div id="transactions"></div>
</div>

<!-- MENU -->
<div id="menu" class="bottom" style="display:none">
<div id="homeNav">🏠</div>
<div id="depositNav">💰</div>
<div id="withdrawNav">💸</div>
<div id="monitorNav">📊</div>
<div id="logoutNav">🚪</div>
</div>

<script src="app.js"></script>
</body>
</html>
