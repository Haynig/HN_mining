<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HN Wallet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
  <select id="withdrawType">

<option value="ton">HN → TON wallet</option>

<option value="card">So'm → karta</option>

<option value="hn_user">HN → foydalanuvchi</option>

<option value="som_user">So'm → foydalanuvchi</option>

</select>
  
<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

.page{
display:none;
padding:20px;
padding-bottom:90px;
}

.greenBtn{
background:#28a745;
color:white;
border:none;
padding:12px 30px;
border-radius:50px;
margin-top:10px;
font-size:16px;
}

.active{
display:block;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:12px;
}
.som{
background:#e8f8ec;
border-left:6px solid #28a745;
}

.hn{
background:#eaf1ff;
border-left:6px solid #2f6df6;
}

.cashback{
background:#fff6e5;
border-left:6px solid orange;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:black;
color:white;
margin-top:10px;
width:100%;
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #ddd;
}
  .green{
background:#1faa59;
color:white;
}

.blue{
background:#2f80ed;
color:white;
}

.deposit{
background:#d4f8d4;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="page active">
<h2>Login</h2>
<input id="loginUsername" placeholder="Username"><br><br>
<input id="loginPassword" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
<button onclick="showPage('registerPage')">Register</button>
</div>

<!-- REGISTER -->
<div id="registerPage" class="page">
<h2>Register</h2>
<input id="regUsername" placeholder="Username"><br><br>
<input id="regPassword" type="password" placeholder="Password"><br><br>
<button onclick="register()">Register</button>
<button onclick="showPage('loginPage')">Back</button>
</div>

<!-- HOME -->
<div id="homePage" class="page">
<h2>Home</h2>
<h2>Umumiy balans</h2>

<div class="card som">
So‘m hisob
<br>
<b id="somBalance">0</b>
</div>

<div class="card">
HN kursi
<br>
<b id="hnPrice">loading...</b> USD
</div>
  
<div class="card hn">
HN hisob
<br>
<b id="hnBalance">0</b>
</div>

<div class="card cashback">
Cashback
<br>
<b id="cashbackBalance">0</b>
</div>
  
  <h3>Jamg'armalar</h3>

<button onclick="createDeposit()">+ Jamg‘arma ochish</button>

<div id="deposits"></div>
</div>

<!-- DEPOSIT -->
<div id="depositPage" class="page">

<h2>To'ldirish</h2>

<select id="depositType" onchange="showDepositOptions()">

<option value="">Variant tanlang</option>

<option value="hn">HN token</option>

<option value="som">So'm</option>

</select>

<div id="depositOptions"></div>

</div>
  
<!-- WITHDRAW -->
<div id="withdrawPage" class="page">

<h2>Pul yechish</h2>

<select id="withdrawMethod" onchange="showWithdrawOptions()">

<option value="">Variant tanlang</option>

<option value="ton">TON wallet</option>

<option value="card">Karta (UZCARD/HUMO)</option>

<option value="user">Foydalanuvchiga o'tkazish</option>

</select>

<div id="withdrawOptions"></div>

</div>

<!-- MONITOR -->
<div id="monitorPage" class="page">
<h2>Monitoring</h2>
<select id="filterType" onchange="loadTransactions()">

<option value="all">Barchasi</option>

<option value="deposit">Deposit</option>

<option value="withdraw">Withdraw</option>

<option value="transfer">Transfer</option>

</select>

<div id="transactions"></div>
</div>

<!-- MENU -->
<div id="menu" class="bottom" style="display:none">

<button onclick="showPage('homePage')loadHNPrice();">🏠</button>
<button onclick="showPage('depositPage')">💰</button>
<button onclick="showPage('withdrawPage')">💸</button>
<button onclick="showPage('monitorPage')">📊</button>
<button onclick="logout()">🚪</button>

</div>
<script>

const API =
window.location.hostname==="localhost"
? "http://localhost:10000/api"
: "https://hn-bilimdoni-backend.onrender.com/api";


function showPage(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));

document.getElementById(id).classList.add("active");

}
  
function openDeposit(){
const depo = document.getElementById("deposits")
depo.innerHTML += `
<div class="card deposit">
Jamg‘arma balansi: 0
</div>
`

}

function saveToken(token){

localStorage.setItem("token",token);

}


function getToken(){

return localStorage.getItem("token");

}


function authHeader(){

return {

Authorization:"Bearer "+getToken()

};

}


async function register(){

const username = regUsername.value;

const password = regPassword.value;

const res = await fetch(API+"/user/register",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({username,password})

});

const data = await res.json();

alert(data.message);

if(res.ok){

showPage("loginPage");

}

}


async function login(){

const username = loginUsername.value;

const password = loginPassword.value;

const res = await fetch(API+"/user/login",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({username,password})

});

const data = await res.json();

if(data.token){

saveToken(data.token);

document.getElementById("menu").style.display="flex";

showPage("homePage");
document.getElementById("menu").style.display="flex";

loadProfile();

}else{

alert(data.message);

}

}
const tonConnect = new TON_CONNECT_UI.TonConnectUI({
  manifestUrl: "https://haynig.github.io/HN_mining/tonconnect-manifest.json",
  buttonRootId: "tonArea"
});

async function showTon(){
  const wallet = await tonConnect.connectWallet();

  if(wallet){
    alert("Wallet connected: " + wallet.account.address);
  }
}

async function loadProfile(){

const res = await fetch(API+"/user/me",{

headers:authHeader()

});

  async function loadHNPrice(){

const res = await fetch("https://tonapi.io/v2/rates?tokens=ton&currencies=usd");

const data = await res.json();

const price = data.rates.TON.prices.USD;

document.getElementById("hnPrice").innerText = price;

}

const data = await res.json();

somBalance.innerText = data.somBalance;

hnBalance.innerText = data.hnBalance;

}
  
async function loadTransactions(){

const res = await fetch(API+"/wallet/transactions",{
headers:authHeader()
});

const data = await res.json();

transactions.innerHTML="";

data.forEach(t=>{

transactions.innerHTML += `
<div class="card">
${t.type} : ${t.amount}
<br>
${new Date(t.createdAt).toLocaleString()}
</div>
`;

});

}

function showDepositOptions(){

const type = document.getElementById("depositType").value;

const box = document.getElementById("depositOptions");

box.innerHTML="";

if(type==="hn"){

box.innerHTML=`

<select id="hnMethod">

<option value="ton">TON wallet</option>

<option value="hnwallet">HN wallet</option>

</select>

<input id="depositAmount" placeholder="HN miqdor">

<button class="greenBtn" onclick="deposit()">To'ldirish</button>

`;

}

if(type==="som"){

box.innerHTML=`

<select id="cardType">

<option value="uzcard">UZCARD</option>

<option value="humo">HUMO</option>

</select>

<input id="depositAmount" placeholder="So'm miqdor">

<button class="greenBtn" onclick="deposit()">To'ldirish</button>

`;

}

}
  
async function createDeposit(){

const res = await fetch(API+"/wallet/createDeposit",{
method:"POST",
headers:authHeader()
});

const data = await res.json();

alert(data.message);

}

function showWithdrawOptions(){

const method = document.getElementById("withdrawMethod").value;

const box = document.getElementById("withdrawOptions");

box.innerHTML="";

if(method==="ton"){

box.innerHTML=`

<input id="withdrawAmount" placeholder="HN miqdor">

<button class="greenBtn" onclick="withdraw()">Yechish</button>

`;

}

if(method==="card"){

box.innerHTML=`

<select id="cardType">

<option value="uzcard">UZCARD</option>

<option value="humo">HUMO</option>

</select>

<input id="withdrawAmount" placeholder="So'm miqdor">

<button class="greenBtn" onclick="withdraw()">Yechish</button>

`;

}

if(method==="user"){

box.innerHTML=`

<input id="transferUser" placeholder="Username">

<input id="withdrawAmount" placeholder="HN miqdor">

<button class="greenBtn" onclick="transfer()">Yuborish</button>

`;

}

}
  
function logout(){

localStorage.removeItem("token");

location.reload();

}

</script>

</body>
</html>
